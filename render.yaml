# render.yaml — Render.com free deployment config
# This tells Render how to run your WhatsApp bot for FREE

services:
  - type: web
    name: erayaa-whatsapp-bot
    env: node
    plan: free
    buildCommand: apt-get install -y chromium && npm install && npx puppeteer browsers install chrome
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "false"
      - key: PUPPETEER_EXECUTABLE_PATH
        value: /usr/bin/chromium
    disk:
      name: whatsapp-session
      mountPath: /opt/render/project/src/.wwebjs_auth
      sizeGB: 1
