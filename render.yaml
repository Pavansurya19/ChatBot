# render.yaml — Render.com free deployment config
# This tells Render how to run your WhatsApp bot for FREE

services:
  - type: web
    name: erayaa-whatsapp-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: whatsapp-session
      mountPath: /opt/render/project/src/.wwebjs_auth
      sizeGB: 1
