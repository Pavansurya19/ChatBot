# render.yaml — Render.com free deployment config
services:
  - type: web
    name: erayaa-whatsapp-bot
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
    disk:
      name: whatsapp-session
      mountPath: /opt/render/project/src/auth_info
      sizeGB: 1
